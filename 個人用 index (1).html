<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grimm Gravity — グリム重力脱出</title>
  <link rel="stylesheet" href="個人用 style.css">
  <link rel="stylesheet" href="個人用 mobile.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="hud">
      <span id="stageName"></span>
      <span id="moveCount">moves: 0</span>
      <button id="nameSetBtn">✏️</button>
    </div>
    <div id="gravityIndicator">
      <div id="gravArrow">↓</div>
      <div id="gravLabel">重力</div>
    </div>
  </div>
  <div id="overlay" class="hidden">
    <div id="overlayBox">
      <div id="overlayTitle"></div>
      <div id="overlayText"></div>
      <button id="overlayBtn"></button>
      <button id="overlayTitleBtn" class="hidden">🏠 タイトルに戻る</button>
    </div>
  </div>
  <!-- プレイヤー名入力ダイアログ -->
  <div id="nameDialog" class="hidden">
    <div id="nameDialogBox">
      <div id="nameDialogTitle">⚔️ 冒険者の名前を入力</div>
      <input type="text" id="nameInput" maxlength="12" placeholder="名前(12文字以内)" />
      <button id="nameSubmitBtn">決定</button>
    </div>
  </div>

  <!-- スマホ用コントロールボタン -->
  <div id="mobileControls">
    <div id="dpad">
      <button class="dpad-btn" id="btnUp"    onclick="changeGravity('UP')">↑</button>
      <div class="dpad-row">
        <button class="dpad-btn" id="btnLeft"  onclick="changeGravity('LEFT')">←</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" id="btnRight" onclick="changeGravity('RIGHT')">→</button>
      </div>
      <button class="dpad-btn" id="btnDown"  onclick="changeGravity('DOWN')">↓</button>
    </div>
    <div id="subBtns">
      <button class="sub-btn" onclick="undoMove()">↩ アンドゥ</button>
      <button class="sub-btn" onclick="loadStage(state.stage)">↺ リセット</button>
    </div>
  </div>

  <div id="titleScreen">
    <div id="titleContent">
      <div id="titleLogo">
        <div class="logo-line">GRIMM</div>
        <div class="logo-line logo-line2">GRAVITY</div>
        <div class="logo-sub">グリム重力脱出パズル</div>
      </div>
      <div id="titleStory">
        魔女の呪いで立方体の迷宮に閉じ込められた。<br>
        重力を操り、出口を目指せ。
      </div>
      <div id="startBtns">
        <button id="startBtn">はじめから</button>
        <button id="continueBtn">つづきから</button>
      </div>
      <div id="controls">
        <div class="ctrl-row"><kbd>←</kbd><kbd>↑</kbd><kbd>→</kbd><kbd>↓</kbd> または <kbd>A</kbd><kbd>W</kbd><kbd>D</kbd><kbd>S</kbd> — 重力方向変更</div>
        <div class="ctrl-row"><kbd>R</kbd> — リセット &nbsp; <kbd>Z</kbd> — アンドゥ</div>
      </div>
    </div>
    <div id="titleParticles"></div>
  </div>
  <!--
    読み込み順序（依存関係）:
      0. supabase-js — Supabase クライアント本体（CDN）
      1. levels.js   — T, DIRS, STAGES を定義（他の全ファイルが参照）
      2. renderer.js — canvas / ctx / render 系を定義（logic.js が呼び出す）
      3. auth.js     — 匿名認証・セーブデータ連携（supabase-js, state に依存）
      4. logic.js    — state / gameLoop など。levels & renderer & auth に依存
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="個人用 levels.js"></script>
  <script src="個人用 renderer.js"></script>
  <script src="個人用 auth.js"></script>
  <script src="個人用 logic.js"></script>
</body>
</html>
